name: Publicar en Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hostinger-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Compilar y publicar
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Descargar el código
        uses: actions/checkout@v5

      - name: Preparar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar la aplicación
        run: |
          npm run build
          mkdir -p dist/api
          cp -R server/api/. dist/api/

      - name: Validar la API PHP
        run: find server -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Preparar configuración privada
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          APP_SETUP_TOKEN: ${{ secrets.APP_SETUP_TOKEN }}
          INFO_EMAIL_USER: ${{ secrets.INFO_EMAIL_USER }}
          INFO_EMAIL_PASSWORD: ${{ secrets.INFO_EMAIL_PASSWORD }}
          OPERATIONS_EMAIL_USER: ${{ secrets.OPERATIONS_EMAIL_USER }}
          OPERATIONS_EMAIL_PASSWORD: ${{ secrets.OPERATIONS_EMAIL_PASSWORD }}
        run: |
          for variable in DB_HOST DB_NAME DB_USER DB_PASSWORD APP_SETUP_TOKEN INFO_EMAIL_USER INFO_EMAIL_PASSWORD OPERATIONS_EMAIL_USER OPERATIONS_EMAIL_PASSWORD; do
            if [ -z "${!variable}" ]; then
              echo "::error::El secreto $variable está vacío o no existe."
              exit 1
            fi
          done
          mkdir -p .deploy
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          values = {
              "db_host": os.environ["DB_HOST"],
              "db_name": os.environ["DB_NAME"],
              "db_user": os.environ["DB_USER"],
              "db_password": os.environ["DB_PASSWORD"],
              "setup_token": os.environ["APP_SETUP_TOKEN"],
              "info_email_user": os.environ["INFO_EMAIL_USER"],
              "info_email_password": os.environ["INFO_EMAIL_PASSWORD"],
              "operations_email_user": os.environ["OPERATIONS_EMAIL_USER"],
              "operations_email_password": os.environ["OPERATIONS_EMAIL_PASSWORD"],
          }
          payload = json.dumps(values, ensure_ascii=False)
          config = "<?php\nreturn json_decode(<<<'JSON'\n" + payload + "\nJSON, true, 512, JSON_THROW_ON_ERROR);\n"
          Path(".deploy/swiftport-config.php").write_text(config, encoding="utf-8")
          PY

      - name: Instalar cliente FTPS
        run: |
          sudo apt-get update
          sudo apt-get install --yes lftp

      - name: Validar configuración FTP
        env:
          FTP_HOST: 147.93.93.165
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          if [ -z "$FTP_HOST" ]; then
            echo "::error::El secreto FTP_HOST está vacío o no existe."
            exit 1
          fi
          if [ -z "$FTP_USER" ]; then
            echo "::error::El secreto FTP_USER está vacío o no existe."
            exit 1
          fi
          if [ -z "$FTP_PASSWORD" ]; then
            echo "::error::El secreto FTP_PASSWORD está vacío o no existe."
            exit 1
          fi

      - name: Publicar dist en Hostinger
        env:
          FTP_HOST: 147.93.93.165
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          set +e
          FTP_RESULT=$(timeout 240s lftp -u "$FTP_USER","$FTP_PASSWORD" "$FTP_HOST" -e "
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ssl:verify-certificate false;
            set net:timeout 20;
            set net:max-retries 2;
            set net:reconnect-interval-base 5;
            set net:reconnect-interval-max 10;
            put .deploy/swiftport-config.php -o /swiftport-config.php;
            mirror --reverse --delete --verbose dist/ /public_html/;
            bye
          " 2>&1)
          FTP_STATUS=$?
          set -e

          if [ "$FTP_STATUS" -eq 0 ]; then
            exit 0
          fi

          export FTP_RESULT
          SAFE_RESULT=$(python3 -c '
          import os
          result = os.environ.get("FTP_RESULT", "")
          for key in ("FTP_USER", "FTP_PASSWORD"):
              value = os.environ.get(key, "")
              if value:
                  result = result.replace(value, "***")
          print(" | ".join(result.splitlines())[:800])
          ')
          echo "::error::Detalle FTPS seguro: $SAFE_RESULT"

          if echo "$FTP_RESULT" | grep -Eqi "login failed|authentication failed|530"; then
            echo "::error::Hostinger rechazó el usuario o la contraseña FTP."
          elif echo "$FTP_RESULT" | grep -Eqi "certificate|ssl|tls"; then
            echo "::error::No se pudo validar la conexión segura FTPS de Hostinger."
          elif echo "$FTP_RESULT" | grep -Eqi "name or service not known|resolve|unknown host"; then
            echo "::error::FTP_HOST no es un servidor válido. Usa solo el hostname o la IP, sin https:// ni rutas."
          elif echo "$FTP_RESULT" | grep -Eqi "connection refused|timed out|no route|failed to connect"; then
            echo "::error::No se pudo conectar con el servidor FTP de Hostinger por el puerto 21."
          elif echo "$FTP_RESULT" | grep -Eqi "permission denied|access failed|550"; then
            echo "::error::La cuenta FTP no tiene permisos de escritura en su public_html."
          else
            echo "::error::La conexión FTPS falló por una causa no reconocida. Revisa los datos de la cuenta FTP de Hostinger."
          fi
          exit "$FTP_STATUS"
