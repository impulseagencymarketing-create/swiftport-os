name: Validar rama de pruebas

on:
  push:
    branches:
      - "test/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Compilar y probar
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Descargar el código
        uses: actions/checkout@v5
      - name: Preparar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Instalar dependencias
        run: npm ci
      - name: Compilar aplicación
        run: npm run build
      - name: Validar PHP
        run: find server -name '*.php' -print0 | xargs -0 -n1 php -l
      - name: Probar correlación de correos
        run: php server/tests/mail_correlation_test.php
